<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>hello-box demo</title>
    <style>
      /* 자기완결 정적 데모 (외부 의존 0, 상대경로) — 1단계 저장소 검증용 */
      :root {
        color-scheme: light;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, sans-serif;
        background: #f8fafc;
      }
      .box {
        width: 140px;
        height: 140px;
        border-radius: 20px;
        background: linear-gradient(135deg, #6366f1, #ec4899);
        box-shadow: 0 12px 40px rgba(99, 102, 241, 0.45);
        animation: float 2.4s ease-in-out infinite;
        display: grid;
        place-items: center;
        color: white;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.15s ease;
      }
      .box:active {
        transform: scale(0.92);
      }
      @keyframes float {
        0%,
        100% {
          transform: translateY(0) rotate(0deg);
        }
        50% {
          transform: translateY(-18px) rotate(6deg);
        }
      }
      .label {
        margin-top: 24px;
        color: #475569;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div>
      <div class="box" id="box" role="button" tabindex="0">click</div>
      <div class="label" id="label">clicks: 0</div>
    </div>
    <script>
      const box = document.getElementById("box");
      const label = document.getElementById("label");
      let n = 0;
      box.addEventListener("click", () => {
        n += 1;
        label.textContent = "clicks: " + n;
      });
    </script>
  </body>
</html>
