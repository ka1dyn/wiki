<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>기법 8 · @property conic 회전</title>
    <style>
      * { box-sizing: border-box; }
      :root { color-scheme: dark; }
      body { margin: 0; padding: 48px; display: flex; justify-content: center; background: #18181b; font-family: system-ui, sans-serif; }
      @property --angle { syntax: '<angle>'; initial-value: 0deg; inherits: false; }
      .box {
        width: 160px; height: 90px; border: 4px solid transparent; border-radius: 12px;
        background: linear-gradient(#18181b, #18181b) padding-box,
                    conic-gradient(from var(--angle), #ff5d5d, #5d8bff, #5dffa1, #ff5d5d) border-box;
        display: grid; place-items: center; color: #e4e4e7; font-size: 12px;
        animation: spin 4s linear infinite;
      }
      @keyframes spin { to { --angle: 360deg; } }
    </style>
  </head>
  <body>
    <div class="box">@property conic</div>
    <script>
      function postHeight() { const h = Math.ceil(document.body.getBoundingClientRect().height); parent.postMessage({ type: "demo:height", height: h }, "*"); }
      addEventListener("load", postHeight); if (window.ResizeObserver) new ResizeObserver(postHeight).observe(document.body);
    </script>
  </body>
</html>
