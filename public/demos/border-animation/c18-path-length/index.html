<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>기법 18 · JS path 길이 측정</title>
    <style>
      * { box-sizing: border-box; }
      :root { color-scheme: dark; }
      body { margin: 0; padding: 48px; display: flex; justify-content: center; background: #18181b; font-family: system-ui, sans-serif; }
      svg { display: block; }
    </style>
  </head>
  <body>
    <svg viewBox="0 0 150 80" width="200" height="107">
      <path d="M15 3 H135 a12 12 0 0 1 12 12 V65 a12 12 0 0 1 -12 12 H15 a12 12 0 0 1 -12 -12 V15 a12 12 0 0 1 12 -12 Z"
            fill="none" stroke="#5dffa1" stroke-width="3" stroke-linecap="round" />
    </svg>
    <script>
      const path = document.querySelector('path');
      const len = path.getTotalLength();
      path.style.strokeDasharray = len;
      path.style.strokeDashoffset = len;
      path.animate(
        [{ strokeDashoffset: len }, { strokeDashoffset: 0 }],
        { duration: 2200, iterations: Infinity }
      );

      function postHeight() { const h = Math.ceil(document.body.getBoundingClientRect().height); parent.postMessage({ type: "demo:height", height: h }, "*"); }
      addEventListener("load", postHeight); if (window.ResizeObserver) new ResizeObserver(postHeight).observe(document.body);
    </script>
  </body>
</html>
