<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>기법 9 · @property border-image</title>
    <style>
      * { box-sizing: border-box; }
      :root { color-scheme: dark; }
      body { margin: 0; padding: 48px; display: flex; justify-content: center; background: #18181b; font-family: system-ui, sans-serif; }
      .stage { display: flex; flex-direction: column; align-items: center; gap: 14px; }
      @property --angle { syntax: '<angle>'; initial-value: 0deg; inherits: false; }
      .box {
        width: 160px; height: 90px; border: 5px solid;
        border-image: linear-gradient(var(--angle), #ff5d5d, #5dffa1) 1;
        display: grid; place-items: center; color: #e4e4e7; font-size: 12px;
        animation: spin 4s linear infinite;
      }
      @keyframes spin { to { --angle: 360deg; } }
      .label { color: #71717a; font-size: 12px; text-align: center; }
    </style>
  </head>
  <body>
    <div class="stage">
      <div class="box">border-image</div>
      <div class="label">각진 사각형 전용 — border-radius는 안 먹는다(문제 3)</div>
    </div>
    <script>
      function postHeight() { const h = Math.ceil(document.body.getBoundingClientRect().height); parent.postMessage({ type: "demo:height", height: h }, "*"); }
      addEventListener("load", postHeight); if (window.ResizeObserver) new ResizeObserver(postHeight).observe(document.body);
    </script>
  </body>
</html>
