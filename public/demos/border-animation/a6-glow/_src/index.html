<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>기법 6 · glow / pulse</title>
    <style>
      * { box-sizing: border-box; }
      :root { color-scheme: dark; }
      body { margin: 0; padding: 48px; display: flex; justify-content: center; background: #18181b; font-family: system-ui, sans-serif; }
      .box {
        width: 160px; height: 90px; border-radius: 12px; border: 2px solid #5d8bff; background: #27272a;
        display: grid; place-items: center; color: #e4e4e7; font-size: 13px;
        animation: glow 1.4s ease-in-out infinite alternate;
      }
      @keyframes glow {
        from { box-shadow: 0 0 4px #5d8bff, 0 0 8px #5d8bff; }
        to   { box-shadow: 0 0 12px #5d8bff, 0 0 26px #5d8bff; }
      }
    </style>
  </head>
  <body>
    <div class="box">glow</div>
    <script>
      function postHeight() { const h = Math.ceil(document.body.getBoundingClientRect().height); parent.postMessage({ type: "demo:height", height: h }, "*"); }
      addEventListener("load", postHeight); if (window.ResizeObserver) new ResizeObserver(postHeight).observe(document.body);
    </script>
  </body>
</html>
