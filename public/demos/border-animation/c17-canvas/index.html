<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>기법 17 · Canvas + Path2D</title>
    <style>
      * { box-sizing: border-box; }
      :root { color-scheme: dark; }
      body { margin: 0; padding: 48px; display: flex; justify-content: center; background: #18181b; font-family: system-ui, sans-serif; }
      canvas { display: block; }
    </style>
  </head>
  <body>
    <canvas width="200" height="110"></canvas>
    <script>
      const canvas = document.querySelector('canvas');
      const ctx = canvas.getContext('2d');
      function roundRect(x, y, w, h, r) {
        const p = new Path2D();
        p.moveTo(x + r, y);
        p.arcTo(x + w, y, x + w, y + h, r); p.arcTo(x + w, y + h, x, y + h, r);
        p.arcTo(x, y + h, x, y, r);         p.arcTo(x, y, x + w, y, r);
        p.closePath(); return p;
      }
      (function draw(t) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const g = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
        g.addColorStop(0, '#ff5d5d'); g.addColorStop(1, '#5d8bff');
        ctx.strokeStyle = g; ctx.lineWidth = 3;
        ctx.setLineDash([10, 6]); ctx.lineDashOffset = -t / 40;
        ctx.stroke(roundRect(5, 5, canvas.width - 10, canvas.height - 10, 12));
        requestAnimationFrame(draw);
      })(0);

      function postHeight() { const h = Math.ceil(document.body.getBoundingClientRect().height); parent.postMessage({ type: "demo:height", height: h }, "*"); }
      addEventListener("load", postHeight); if (window.ResizeObserver) new ResizeObserver(postHeight).observe(document.body);
    </script>
  </body>
</html>
