<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>기법 1 · outline-offset</title>
    <style>
      * { box-sizing: border-box; }
      :root { color-scheme: dark; }
      body { margin: 0; padding: 48px; display: flex; justify-content: center; background: #18181b; font-family: system-ui, sans-serif; }
      .box {
        width: 160px; height: 90px; border-radius: 12px; background: #27272a;
        display: grid; place-items: center; color: #e4e4e7; font-size: 13px;
        /* outline은 레이아웃을 차지하지 않아 offset 애니메이션이 부드럽다 */
        animation: ol 1.5s ease-in-out infinite alternate;
      }
      @keyframes ol {
        from { outline: 2px solid #5d8bff; outline-offset: 0; }
        to   { outline: 2px solid #5d8bff; outline-offset: 9px; }
      }
    </style>
  </head>
  <body>
    <div class="box">outline</div>
    <script>
      function postHeight() { const h = Math.ceil(document.body.getBoundingClientRect().height); parent.postMessage({ type: "demo:height", height: h }, "*"); }
      addEventListener("load", postHeight); if (window.ResizeObserver) new ResizeObserver(postHeight).observe(document.body);
    </script>
  </body>
</html>
