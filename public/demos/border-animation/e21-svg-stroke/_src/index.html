<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>기법 21 · SVG stroke 색 전환</title>
    <style>
      * { box-sizing: border-box; }
      :root { color-scheme: dark; }
      body { margin: 0; padding: 48px; display: flex; justify-content: center; background: #18181b; font-family: system-ui, sans-serif; }
      svg { display: block; }
    </style>
  </head>
  <body>
    <svg viewBox="0 0 150 80" width="200" height="107">
      <rect x="3" y="3" width="144" height="74" rx="12" fill="none" stroke-width="3">
        <animate attributeName="stroke"
                 values="#ff5d5d;#5d8bff;#5dffa1;#ff5d5d"
                 dur="4s" repeatCount="indefinite" />
      </rect>
    </svg>
    <script>
      function postHeight() { const h = Math.ceil(document.body.getBoundingClientRect().height); parent.postMessage({ type: "demo:height", height: h }, "*"); }
      addEventListener("load", postHeight); if (window.ResizeObserver) new ResizeObserver(postHeight).observe(document.body);
    </script>
  </body>
</html>
