<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>기법 16 · 마우스 추적 spotlight</title>
    <style>
      * { box-sizing: border-box; }
      :root { color-scheme: dark; }
      body { margin: 0; padding: 48px; display: flex; justify-content: center; background: #18181b; font-family: system-ui, sans-serif; }
      .stage { display: flex; flex-direction: column; align-items: center; gap: 14px; }
      .box {
        width: 220px; height: 120px; border: 2px solid transparent; border-radius: 12px;
        display: grid; place-items: center; color: #e4e4e7; font-size: 12px;
        background: linear-gradient(#18181b, #18181b) padding-box,
                    radial-gradient(120px circle at var(--mx, 50%) var(--my, 50%), #5d8bff, transparent 65%) border-box;
      }
      .label { color: #71717a; font-size: 12px; text-align: center; }
    </style>
  </head>
  <body>
    <div class="stage">
      <div class="box">박스 위로 마우스</div>
      <div class="label">커서를 따라 테두리 빛이 움직인다 (JS는 좌표만 전달)</div>
    </div>
    <script>
      const box = document.querySelector('.box');
      box.addEventListener('pointermove', (e) => {
        const r = box.getBoundingClientRect();
        box.style.setProperty('--mx', `${e.clientX - r.left}px`);
        box.style.setProperty('--my', `${e.clientY - r.top}px`);
      });

      function postHeight() { const h = Math.ceil(document.body.getBoundingClientRect().height); parent.postMessage({ type: "demo:height", height: h }, "*"); }
      addEventListener("load", postHeight); if (window.ResizeObserver) new ResizeObserver(postHeight).observe(document.body);
    </script>
  </body>
</html>
