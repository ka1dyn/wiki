<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>기법 19 · element.animate (WAAPI)</title>
    <style>
      * { box-sizing: border-box; }
      :root { color-scheme: dark; }
      body { margin: 0; padding: 48px; display: flex; justify-content: center; background: #18181b; font-family: system-ui, sans-serif; }
      .box { width: 160px; height: 90px; border: 4px solid #ff5d5d; border-radius: 12px; background: #27272a; display: grid; place-items: center; color: #e4e4e7; font-size: 13px; }
    </style>
  </head>
  <body>
    <div class="box">WAAPI</div>
    <script>
      const box = document.querySelector('.box');
      box.animate(
        [
          { borderColor: '#ff5d5d' },
          { borderColor: '#5d8bff' },
          { borderColor: '#5dffa1' },
          { borderColor: '#ff5d5d' },
        ],
        { duration: 4000, iterations: Infinity }
      );

      function postHeight() { const h = Math.ceil(document.body.getBoundingClientRect().height); parent.postMessage({ type: "demo:height", height: h }, "*"); }
      addEventListener("load", postHeight); if (window.ResizeObserver) new ResizeObserver(postHeight).observe(document.body);
    </script>
  </body>
</html>
