<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>문제 1 · border-width 리플로우</title>
    <style>
      * { box-sizing: border-box; }
      :root { color-scheme: dark; }
      body { margin: 0; padding: 48px; display: flex; justify-content: center; background: #18181b; font-family: system-ui, sans-serif; }
      .stage { display: flex; flex-direction: column; align-items: center; gap: 14px; }
      .row { display: flex; gap: 14px; }
      /* ❌ border-width를 직접 움직이면 요소가 커지며 이웃이 밀린다(리플로우) */
      .box { width: 92px; height: 70px; border: 2px solid #5d8bff; border-radius: 10px; background: #27272a; display: grid; place-items: center; color: #e4e4e7; font-size: 12px; transition: border-width .3s; }
      .box.first:hover { border-width: 12px; }
      .label { color: #71717a; font-size: 12px; text-align: center; }
    </style>
  </head>
  <body>
    <div class="stage">
      <div class="row">
        <div class="box first">hover</div>
        <div class="box">B</div>
        <div class="box">C</div>
      </div>
      <div class="label">첫 박스에 hover → 이웃 박스가 밀린다 (리플로우)</div>
    </div>
    <script>
      function postHeight() { const h = Math.ceil(document.body.getBoundingClientRect().height); parent.postMessage({ type: "demo:height", height: h }, "*"); }
      addEventListener("load", postHeight); if (window.ResizeObserver) new ResizeObserver(postHeight).observe(document.body);
    </script>
  </body>
</html>
