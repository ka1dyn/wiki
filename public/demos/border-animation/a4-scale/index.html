<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>기법 4 · pseudo + transform scale</title>
    <style>
      * { box-sizing: border-box; }
      :root { color-scheme: dark; }
      body { margin: 0; padding: 48px; display: flex; justify-content: center; background: #18181b; font-family: system-ui, sans-serif; }
      .stage { display: flex; flex-direction: column; align-items: center; gap: 14px; }
      .box { position: relative; width: 160px; height: 90px; border-radius: 12px; background: #27272a; display: grid; place-items: center; color: #e4e4e7; font-size: 13px; }
      .box::before {
        content: ''; position: absolute; inset: 0;
        border: 3px solid #ff5d5d; border-radius: 12px;
        transform: scale(.78); opacity: 0;
        transition: .3s;
      }
      .box:hover::before { transform: scale(1); opacity: 1; }
      .label { color: #71717a; font-size: 12px; text-align: center; }
    </style>
  </head>
  <body>
    <div class="stage">
      <div class="box">hover</div>
      <div class="label">hover → 테두리가 확대되며 나타남 (transform/opacity)</div>
    </div>
    <script>
      function postHeight() { const h = Math.ceil(document.body.getBoundingClientRect().height); parent.postMessage({ type: "demo:height", height: h }, "*"); }
      addEventListener("load", postHeight); if (window.ResizeObserver) new ResizeObserver(postHeight).observe(document.body);
    </script>
  </body>
</html>
