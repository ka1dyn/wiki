<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>a2 · box-shadow spread</title>
    <style>
      * { box-sizing: border-box; }
      :root { color-scheme: dark; }
      body {
        margin: 0;
        padding: 48px;
        display: flex;
        justify-content: center;
        background: #18181b;
        font-family: system-ui, sans-serif;
      }
      .box {
        width: 160px;
        height: 90px;
        border-radius: 12px;
        background: #27272a;
        display: grid;
        place-items: center;
        color: #e4e4e7;
        font-weight: 600;
        font-size: 14px;
        /* 기법 2: box-shadow spread — 레이아웃 영향 없이 두께가 부드럽게 */
        animation: bs 1.4s ease-in-out infinite alternate;
      }
      @keyframes bs {
        from { box-shadow: 0 0 0 2px #5d8bff; }
        to   { box-shadow: 0 0 0 9px #5d8bff; }
      }
    </style>
  </head>
  <body>
    <div class="box">box-shadow</div>
    <script>
      // 자동높이: 콘텐츠 높이를 부모로 전송
      function postHeight() {
        const h = Math.ceil(document.body.getBoundingClientRect().height);
        parent.postMessage({ type: "demo:height", height: h }, "*");
      }
      addEventListener("load", postHeight);
      if (window.ResizeObserver) new ResizeObserver(postHeight).observe(document.body);
    </script>
  </body>
</html>
