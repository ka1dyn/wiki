<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>기법 11 · marching ants</title>
    <style>
      * { box-sizing: border-box; }
      :root { color-scheme: dark; }
      body { margin: 0; padding: 48px; display: flex; justify-content: center; background: #18181b; font-family: system-ui, sans-serif; }
      .box {
        width: 160px; height: 90px; border-radius: 12px;
        display: grid; place-items: center; color: #e4e4e7; font-size: 12px;
        background:
          linear-gradient(90deg, #5d8bff 50%, transparent 0) repeat-x,
          linear-gradient(90deg, #5d8bff 50%, transparent 0) repeat-x,
          linear-gradient(0deg,  #5d8bff 50%, transparent 0) repeat-y,
          linear-gradient(0deg,  #5d8bff 50%, transparent 0) repeat-y;
        background-size: 16px 2px, 16px 2px, 2px 16px, 2px 16px;
        background-position: 0 0, 0 100%, 0 0, 100% 0;
        animation: ants .5s linear infinite;
      }
      @keyframes ants {
        to { background-position: 16px 0, -16px 100%, 0 -16px, 100% 16px; }
      }
    </style>
  </head>
  <body>
    <div class="box">marching ants</div>
    <script>
      function postHeight() { const h = Math.ceil(document.body.getBoundingClientRect().height); parent.postMessage({ type: "demo:height", height: h }, "*"); }
      addEventListener("load", postHeight); if (window.ResizeObserver) new ResizeObserver(postHeight).observe(document.body);
    </script>
  </body>
</html>
