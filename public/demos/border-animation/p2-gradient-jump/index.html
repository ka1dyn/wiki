<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>문제 2 · 그라데이션 transition 불가</title>
    <style>
      * { box-sizing: border-box; }
      :root { color-scheme: dark; }
      body { margin: 0; padding: 48px; display: flex; justify-content: center; background: #18181b; font-family: system-ui, sans-serif; }
      .stage { display: flex; flex-direction: column; align-items: center; gap: 14px; }
      /* ❌ hover 해도 그라데이션은 중간값이 없어 뚝 끊긴다 */
      .box {
        width: 160px; height: 90px; border: 5px solid transparent; border-radius: 12px;
        background: linear-gradient(#18181b, #18181b) padding-box,
                    linear-gradient(45deg, #ff5d5d, #5d8bff) border-box;
        transition: background 1s;
        display: grid; place-items: center; color: #e4e4e7; font-size: 12px;
      }
      .box:hover {
        background: linear-gradient(#18181b, #18181b) padding-box,
                    linear-gradient(45deg, #5dffa1, #ffd35d) border-box;
      }
      .label { color: #71717a; font-size: 12px; text-align: center; }
    </style>
  </head>
  <body>
    <div class="stage">
      <div class="box">hover</div>
      <div class="label">hover → 색이 부드럽게 안 변하고 뚝 끊긴다</div>
    </div>
    <script>
      function postHeight() { const h = Math.ceil(document.body.getBoundingClientRect().height); parent.postMessage({ type: "demo:height", height: h }, "*"); }
      addEventListener("load", postHeight); if (window.ResizeObserver) new ResizeObserver(postHeight).observe(document.body);
    </script>
  </body>
</html>
