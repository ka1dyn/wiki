<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>기법 15 · requestAnimationFrame 보간</title>
    <style>
      * { box-sizing: border-box; }
      :root { color-scheme: dark; }
      body { margin: 0; padding: 48px; display: flex; justify-content: center; background: #18181b; font-family: system-ui, sans-serif; }
      .box { width: 160px; height: 90px; border-radius: 12px; background: #27272a; display: grid; place-items: center; color: #e4e4e7; font-size: 13px; }
    </style>
  </head>
  <body>
    <div class="box">rAF</div>
    <script>
      const box = document.querySelector('.box');
      (function loop(t) {
        const spread = 2 + Math.abs(Math.sin(t / 450)) * 9;
        box.style.boxShadow = `0 0 0 ${spread.toFixed(1)}px #5d8bff`;
        requestAnimationFrame(loop);
      })(0);

      function postHeight() { const h = Math.ceil(document.body.getBoundingClientRect().height); parent.postMessage({ type: "demo:height", height: h }, "*"); }
      addEventListener("load", postHeight); if (window.ResizeObserver) new ResizeObserver(postHeight).observe(document.body);
    </script>
  </body>
</html>
